version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
      - ollama
    volumes:
      - ./:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env.example
    depends_on:
      - redis
      - postgres
      - ollama
    volumes:
      - ./:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stock_agent
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # TODO: Pre-pull the target model during deployment bootstrap.

volumes:
  postgres_data:
  ollama_data:
